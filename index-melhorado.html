<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Depois da distopia - Edição Plataformas</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #050510; font-family: sans-serif; user-select: none; touch-action: manipulation; }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        canvas { display: block; }
        .controls { position: absolute; bottom: 30px; left: 20px; right: 20px; display: flex; justify-content: space-between; pointer-events: none; z-index: 20; }
        .d-pad, .action-buttons { display: flex; gap: 20px; pointer-events: auto; }
        .btn { width: 75px; height: 75px; background: rgba(255, 0, 0, 0.1); border: 2px solid #4a0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ff4d4d; font-size: 30px; box-shadow: 0 0 10px rgba(255, 0, 0, 0.2); transition: background 0.2s, transform 0.1s; }
        .btn:active { background: rgba(255, 0, 0, 0.3); transform: scale(0.9); }
        .btn.running { background: rgba(255, 100, 100, 0.4); border-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    <div class="controls">
        <div class="d-pad">
            <div id="btnLeft" class="btn">◀</div>
            <div id="btnRight" class="btn">▶</div>
        </div>
        <div class="action-buttons">
            <div id="btnJump" class="btn">▲</div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- ATIVOS ---
    const spriteSheet = new Image(); spriteSheet.src = 'robot.png';
    const cloudImg    = new Image(); cloudImg.src    = 'nuvem.png';
    const treeImg     = new Image(); treeImg.src     = 'arvore.png';
    const groundImg   = new Image(); groundImg.src   = 'chao_sombrio.png';
    const platImg     = new Image(); platImg.src     = 'plataforma.png';

    // --- CONFIGURAÇÕES ---
    const GRAVITY      = 0.5;   // Será multiplicado por deltaTime normalizado
    const FRICTION     = 0.82;  // Será aplicado de forma frame-rate independente
    const TARGET_FPS   = 60;
    const groundHeight = 100;

    // FIX: Gradiente pré-renderizado — criado uma única vez, recriado apenas no resize
    let bgGradient = null;
    function buildGradient() {
        bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        bgGradient.addColorStop(0,   "#050510");
        bgGradient.addColorStop(0.8, "#2a0505");
        bgGradient.addColorStop(1,   "#1a0000");
    }

    // FIX: OffscreenCanvas pré-renderizado para as árvores (evita ctx.filter por frame)
    let treeOffscreen = null;
    function buildTreeOffscreen() {
        if (!treeImg.complete || treeImg.naturalWidth === 0) return;
        const escalaGlobal = 2.0;
        const maxScale = Math.max(...env.treeLayers.map(l => l.scale));
        const treeW = (200 * maxScale) * escalaGlobal + 10;
        const treeH = treeW * (treeImg.height / treeImg.width) + 10;
        treeOffscreen = document.createElement('canvas');
        treeOffscreen.width  = Math.ceil(treeW);
        treeOffscreen.height = Math.ceil(treeH);
        const offCtx = treeOffscreen.getContext('2d');
        offCtx.filter = "brightness(15%) grayscale(100%)";
        offCtx.drawImage(treeImg, 0, 0, treeOffscreen.width, treeOffscreen.height);
        offCtx.filter = "none";
    }
    // Reconstrói offscreen quando a imagem carregar
    treeImg.onload = buildTreeOffscreen;

    // --- CONFIGURAÇÃO DAS PLATAFORMAS ---
    const platConfig = {
        spacing:    550,
        width:      180,
        height:     25,
        yOffset:    160,
        yVariation: 100
    };

    function getPlatformData(i) {
        const groundY = canvas.height - groundHeight;
        const x = i * platConfig.spacing;
        const y = groundY - (i % 2 === 0 ? platConfig.yOffset : platConfig.yOffset + platConfig.yVariation);
        return { x, y, w: platConfig.width, h: platConfig.height };
    }

    const env = {
        clouds: [
            { x: 100,  y: 50,  scale: 0.3,  speed: 0.05 },
            { x: 700,  y: 120, scale: 0.25, speed: 0.08 },
            { x: 1200, y: 80,  scale: 0.4,  speed: 0.04 }
        ],
        treeLayers: [
            { spacing: 900,  speed: 0.4,  scale: 0.7, offset: 0   },
            { spacing: 1300, speed: 0.65, scale: 1.0, offset: 500 }
        ]
    };

    function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        buildGradient();   // FIX: reconstrói gradiente ao redimensionar
        buildTreeOffscreen();
    }
    window.addEventListener('resize', resize);
    resize();

    // --- PLAYER ---
    const player = {
        x: 300, y: 0,
        width: 64, height: 64,
        velX: 0, velY: 0,
        baseSpeed:  6,
        runSpeed:   10,
        jumpForce:  17,
        grounded:   false,
        facingLeft: false,
        isRunning:  false,

        // FIX: Coyote time — frames restantes após sair de plataforma/chão
        coyoteFrames: 0,
        COYOTE_MAX:   8,

        // FIX: Jump buffer — frames restantes após pressionar pulo no ar
        jumpBufferFrames: 0,
        JUMP_BUFFER_MAX:  10,

        frameX: 0, tickCount: 0,
        baseTicksPerFrame: 6,
        runTicksPerFrame:  3,

        // FIX: Controle de pulo para evitar pulo contínuo ao segurar botão
        jumpHeld:    false,
        jumpPressed: false,

        update(dt) {
            // dt = delta normalizado (1.0 = frame perfeito a 60fps)

            // FIX: física frame-rate independente
            this.velY += GRAVITY * dt;
            this.x    += this.velX * dt;
            this.y    += this.velY * dt;

            // FIX: friction frame-rate independente via potência
            const frictionPow = Math.pow(FRICTION, dt);
            this.velX *= frictionPow;

            let onGround = false;
            const groundY = canvas.height - groundHeight;

            // Colisão com o Chão
            if (this.y + this.height >= groundY) {
                this.y    = groundY - this.height;
                this.velY = 0;
                onGround  = true;
            }

            // FIX: Limite esquerdo — jogador não passa do início do mundo
            if (this.x < 0) {
                this.x    = 0;
                this.velX = 0;
            }

            // Colisão com Plataformas
            const currentIdx = Math.round(this.x / platConfig.spacing);
            for (let i = currentIdx - 2; i <= currentIdx + 2; i++) {
                // FIX: ignora plataformas em índices negativos (atrás do início)
                if (i < 0) continue;

                const plat = getPlatformData(i);
                const prevBottom = this.y + this.height - this.velY * dt;

                if (this.velY >= 0 &&
                    this.x + this.width  * 0.7 > plat.x &&
                    this.x + this.width  * 0.3 < plat.x + plat.w &&
                    this.y + this.height >= plat.y &&
                    prevBottom            <= plat.y + 2) {   // FIX: usa posição anterior p/ evitar tunnel

                    this.y    = plat.y - this.height;
                    this.velY = 0;
                    onGround  = true;
                }
            }

            // FIX: Coyote time
            if (onGround) {
                this.coyoteFrames = this.COYOTE_MAX;
            } else {
                this.coyoteFrames = Math.max(0, this.coyoteFrames - dt);
            }
            this.grounded = onGround;

            // FIX: Jump buffer — decrementa a cada frame
            if (this.jumpBufferFrames > 0) {
                this.jumpBufferFrames = Math.max(0, this.jumpBufferFrames - dt);
            }

            // FIX: Executa o pulo se há buffer E coyote time disponível
            if (this.jumpBufferFrames > 0 && this.coyoteFrames > 0) {
                this.velY             = -this.jumpForce;
                this.coyoteFrames     = 0;
                this.jumpBufferFrames = 0;
            }

            // Animação
            if (Math.abs(this.velX) > 0.5) {
                this.tickCount++;
                const tpf = this.isRunning ? this.runTicksPerFrame : this.baseTicksPerFrame;
                if (this.tickCount > tpf) {
                    this.tickCount = 0;
                    this.frameX = (this.frameX + 1) % 4;
                }
            } else {
                this.frameX = 0;
            }
        },

        draw() {
            const drawX = this.x - cameraX;
            ctx.save();
            if (this.facingLeft) {
                ctx.translate(drawX + this.width, this.y);
                ctx.scale(-1, 1);
            } else {
                ctx.translate(drawX, this.y);
            }
            if (spriteSheet.complete && spriteSheet.naturalWidth > 0) {
                const sw = spriteSheet.width  / 4;
                const sh = spriteSheet.height / 3;
                ctx.drawImage(spriteSheet, this.frameX * sw, 0, sw, sh, 0, 0, this.width, this.height);
            } else {
                ctx.fillStyle = this.isRunning ? "#ff4d4d" : "white";
                ctx.fillRect(0, 0, this.width, this.height);
            }
            ctx.restore();
        }
    };

    // --- CONTROLES ---
    const inputs     = { left: false, right: false, up: false };
    let   pressTimer = null;
    const RUN_DELAY  = 800;

    function setupControls() {
        const bind = (id, prop) => {
            const el    = document.getElementById(id);
            const start = (e) => {
                e.preventDefault();
                inputs[prop] = true;
                if (prop === 'left' || prop === 'right') {
                    if (pressTimer) clearTimeout(pressTimer);
                    pressTimer = setTimeout(() => {
                        if (inputs[prop]) {
                            player.isRunning = true;
                            el.classList.add('running');
                        }
                    }, RUN_DELAY);
                }
                // FIX: ao pressionar pulo, registra buffer (não aciona diretamente)
                if (prop === 'up' && !player.jumpHeld) {
                    player.jumpBufferFrames = player.JUMP_BUFFER_MAX;
                    player.jumpHeld         = true;
                }
            };
            const end = () => {
                inputs[prop] = false;
                if (prop === 'left' || prop === 'right') {
                    if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; }
                    player.isRunning = false;
                    el.classList.remove('running');
                }
                // FIX: libera o latch do pulo ao soltar o botão
                if (prop === 'up') {
                    player.jumpHeld = false;
                }
            };
            el.addEventListener('touchstart', start, { passive: false });
            el.addEventListener('touchend',   end);
            el.addEventListener('mousedown',  start);
            el.addEventListener('mouseup',    end);
            el.addEventListener('mouseleave', end);
        };
        bind('btnLeft',  'left');
        bind('btnRight', 'right');
        bind('btnJump',  'up');

        // Teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft'  || e.key === 'a') { inputs.left  = true; }
            if (e.key === 'ArrowRight' || e.key === 'd') { inputs.right = true; }
            if ((e.key === 'ArrowUp' || e.key === 'w' || e.key === ' ') && !player.jumpHeld) {
                inputs.up               = true;
                player.jumpBufferFrames = player.JUMP_BUFFER_MAX;
                player.jumpHeld         = true;
            }
        });
        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft'  || e.key === 'a') { inputs.left  = false; player.isRunning = false; }
            if (e.key === 'ArrowRight' || e.key === 'd') { inputs.right = false; player.isRunning = false; }
            if (e.key === 'ArrowUp'    || e.key === 'w' || e.key === ' ') {
                inputs.up       = false;
                player.jumpHeld = false;
            }
        });
    }

    // --- AMBIENTE ---
    function drawClouds() {
        ctx.globalAlpha = 0.2;
        env.clouds.forEach(cloud => {
            let xPos = (cloud.x - (cameraX * cloud.speed)) % (canvas.width + 400);
            if (xPos < -200) xPos += canvas.width + 600;
            if (cloudImg.complete && cloudImg.naturalWidth > 0) {
                ctx.drawImage(cloudImg, xPos, cloud.y, 250 * cloud.scale, 150 * cloud.scale);
            }
        });
        ctx.globalAlpha = 1.0;
    }

    function drawTrees() {
        if (!treeOffscreen) return;   // FIX: usa offscreen pré-renderizado
        const groundY      = canvas.height - groundHeight;
        const escalaGlobal = 2.0;

        env.treeLayers.forEach(layer => {
            const treeW = (200 * layer.scale) * escalaGlobal;
            const treeH = treeW * (treeImg.height / treeImg.width);
            for (let i = -layer.spacing; i < canvas.width + layer.spacing * 2; i += layer.spacing) {
                const xPos = i - (cameraX * layer.speed % layer.spacing) + layer.offset;
                ctx.drawImage(treeOffscreen, xPos, groundY - treeH + 15, treeW, treeH);
            }
        });
    }

    function drawPlatforms() {
        const startIdx = Math.floor((cameraX - 600)                / platConfig.spacing);
        const endIdx   = Math.ceil ((cameraX + canvas.width + 600) / platConfig.spacing);

        for (let i = Math.max(0, startIdx); i <= endIdx; i++) {   // FIX: começa em 0
            const plat = getPlatformData(i);
            if (platImg.complete && platImg.naturalWidth > 0) {
                ctx.drawImage(platImg, plat.x - cameraX, plat.y, plat.w, plat.h);
            } else {
                ctx.fillStyle = "#4a0000";
                ctx.fillRect(plat.x - cameraX, plat.y, plat.w, plat.h);
            }
        }
    }

    function drawGround() {
        const groundY  = canvas.height - groundHeight;
        const tileSize = 128;
        if (groundImg.complete && groundImg.naturalWidth > 0) {
            const offset = -(cameraX % tileSize);
            for (let x = offset - tileSize; x < canvas.width + tileSize; x += tileSize) {
                ctx.drawImage(groundImg, x, groundY, tileSize, tileSize);
            }
        } else {
            ctx.fillStyle = '#1a0505';
            ctx.fillRect(0, groundY, canvas.width, groundHeight);
            ctx.fillStyle = '#4a0000';
            ctx.fillRect(0, groundY, canvas.width, 5);
        }
    }

    // --- GAME LOOP com deltaTime ---
    let lastTime = null;

    function gameLoop(timestamp) {
        // FIX: deltaTime normalizado (1.0 = 60fps perfeito); clamped para evitar espiral de morte
        if (!lastTime) lastTime = timestamp;
        const rawDelta = (timestamp - lastTime) / (1000 / TARGET_FPS);
        const dt       = Math.min(rawDelta, 3);   // clamp: no máximo 3× um frame normal
        lastTime       = timestamp;

        // Movimento
        const currentSpeed = player.isRunning ? player.runSpeed : player.baseSpeed;
        if (inputs.left)  { player.velX = -currentSpeed; player.facingLeft = true;  }
        if (inputs.right) { player.velX =  currentSpeed; player.facingLeft = false; }

        player.update(dt);

        // FIX: câmera com limite mínimo em 0 (não mostra área à esquerda do início)
        cameraX = Math.max(0, player.x - canvas.width / 2 + player.width / 2);

        // FIX: usa gradiente pré-construído
        ctx.fillStyle = bgGradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        drawClouds();
        drawTrees();
        drawPlatforms();
        drawGround();
        player.draw();

        requestAnimationFrame(gameLoop);
    }

    setupControls();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
